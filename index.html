<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEROVEE AI - Fix</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 10px; max-width: 80%; word-wrap: break-word; }
        .user { align-self: flex-end; background: #007bff; }
        .ai { align-self: flex-start; background: #222; border: 1px solid #333; }
        .input-box { padding: 15px; display: flex; gap: 10px; background: #111; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; outline: none; }
        button { padding: 10px 20px; background: #007bff; border: none; color: white; border-radius: 5px; cursor: pointer; }
        button:disabled { background: #444; }
    </style>
</head>
<body>

    <div id="chat">
        <div class="msg ai">HEROVEE কানেক্ট হচ্ছে... যদি উত্তর না আসে, তবে বুঝবেন API Key বা মডেল আইডিতে সমস্যা আছে।</div>
    </div>

    <div class="input-box">
        <input type="text" id="user-input" placeholder="এখানে লিখুন...">
        <button id="send-btn">পাঠান</button>
    </div>

    <script>
        const API_KEY = "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";
        
        // মডেল হিসেবে OpenRouter-এর যেকোনো ফ্রি মডেল দিতে পারেন
        const MODEL = "google/gemini-2.0-flash-exp:free"; 

        async function chat() {
            const input = document.getElementById('user-input');
            const btn = document.getElementById('send-btn');
            const chatBox = document.getElementById('chat');
            const text = input.value.trim();

            if(!text) return;

            addMsg(text, 'user');
            input.value = '';
            btn.disabled = true;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": MODEL,
                        "messages": [{"role": "user", "content": text}]
                    })
                });

                const data = await response.json();
                
                if(data.choices && data.choices[0]) {
                    addMsg(data.choices[0].message.content, 'ai');
                } else {
                    addMsg("ভুল: " + (data.error ? data.error.message : "API কাজ করছে না"), 'ai');
                }
            } catch (e) {
                addMsg("নেটওয়ার্ক সমস্যা! ব্রাউজারের কারণে রিকোয়েস্ট ব্লক হতে পারে।", 'ai');
            } finally {
                btn.disabled = false;
            }
        }

        function addMsg(t, s) {
            const d = document.createElement('div');
            d.className = `msg ${s}`;
            d.innerText = t;
            document.getElementById('chat').appendChild(d);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        }

        document.getElementById('send-btn').addEventListener('click', chat);
        document.getElementById('user-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') chat(); });
    </script>
</body>
</html>
