<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEROVEE AI - OpenRouter</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e14; color: #e2e8f0; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 85%; font-size: 15px; line-height: 1.5; }
        .user { align-self: flex-end; background: #2563eb; color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #1e293b; border-bottom-left-radius: 2px; border: 1px solid #334155; }
        .input-box { padding: 15px; background: #111827; display: flex; gap: 8px; border-top: 1px solid #1f2937; }
        input { flex: 1; padding: 12px; border: 1px solid #374151; border-radius: 8px; background: #030712; color: white; outline: none; }
        input:focus { border-color: #3b82f6; }
        button { padding: 10px 18px; background: #3b82f6; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #1f2937; cursor: not-allowed; }
        .status-text { font-size: 12px; color: #94a3b8; margin: 5px 20px; display: none; }
    </style>
</head>
<body>

    <div style="padding: 15px; background: #111827; text-align: center; border-bottom: 1px solid #1f2937;">
        <strong style="color: #3b82f6;">HEROVEE AI</strong>
    </div>

    <div id="chat-window">
        <div class="msg ai">হ্যালো! আমি HEROVEE। আপনার নতুন API কানেকশন এখন অ্যাক্টিভ।</div>
    </div>
    
    <div id="status" class="status-text">HEROVEE উত্তর তৈরি করছে...</div>

    <div class="input-box">
        <input type="text" id="user-input" placeholder="এখানে মেসেজ লিখুন..." autocomplete="off">
        <button id="send-btn">পাঠান</button>
    </div>

    <script>
        // আপনার নতুন OpenRouter API Key
        const API_KEY = "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";
        
        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const chatWindow = document.getElementById('chat-window');
        const status = document.getElementById('status');

        async function chatWithAI() {
            const text = inputField.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            inputField.value = '';
            
            sendBtn.disabled = true;
            status.style.display = 'block';

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`,
                        "HTTP-Referer": "https://herovee.com", // আপনার সাইটের নাম (ঐচ্ছিক)
                        "X-Title": "HEROVEE AI"
                    },
                    body: JSON.stringify({
                        "model": "google/gemini-2.0-flash-exp:free", // এখানে আপনি "meta-llama/llama-3.1-8b-instruct:free" ও দিতে পারেন
                        "messages": [
                            { "role": "system", "content": "You are HEROVEE, a smart AI assistant from Bangladesh." },
                            { "role": "user", "content": text }
                        ]
                    })
                });

                const data = await response.json();
                
                if (data.choices && data.choices[0]) {
                    const aiResponse = data.choices[0].message.content;
                    addMessage(aiResponse, 'ai');
                } else {
                    addMessage("ত্রুটি: API থেকে কোনো রেসপন্স আসেনি।", 'ai');
                }

            } catch (error) {
                console.error("Error:", error);
                addMessage("কানেকশন ইরর! আবার চেষ্টা করুন।", 'ai');
            } finally {
                sendBtn.disabled = false;
                status.style.display = 'none';
            }
        }

        function addMessage(msg, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerText = msg;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        sendBtn.addEventListener('click', chatWithAI);
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') chatWithAI();
        });
    </script>
</body>
</html>
